name: Dispatch to Child Repo

on:
  push:
    branches:
      - main
    paths:
      - 'src/components/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository dispatch
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/junl-zuo/vite_vue3_child/dispatches \
            -d '{"event_type": "sync-components"}'